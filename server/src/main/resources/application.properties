spring.application.name=wellnest-server
server.port=${PORT:8080}
spring.data.mongodb.uri=${MONGO_URI}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:${CORS_ALLOWED_ORIGIN:http://localhost:5173,http://127.0.0.1:5173,http://192.168.*:5173,http://10.*:5173,http://172.16.*:5173,https://*.vercel.app,https://*.onrender.com}}
